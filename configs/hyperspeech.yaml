hyperspeech:
  tokenization:
    mode: "group"
    n_groups: 8
    group_strategy: "auto"

  tokenmixer:
    d_token: 64
    n_layers: 4
    dropout: 0.1
    gating: "swiglu"
    feature_dropout: 0.10

  head:
    d_hidden: 128
    n_layers: 2
    dropout: 0.15

  optimization:
    lr: 0.001
    weight_decay: 0.0007
    max_epochs: 250
    batch_size: 256
    early_stopping_patience: 25
    label_smoothing: 0.02

  mil:
    enabled: true
    attn_hidden: 64
    topk: 5

  screening:
    min_recall: 0.95
    calibration_method: "platt"
