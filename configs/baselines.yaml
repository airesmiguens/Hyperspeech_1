models:
  - name: "histgb"
    type: "sklearn"
    params:
      max_depth: null
      max_leaf_nodes: 31
      learning_rate: 0.05
      max_iter: 500

  - name: "catboost"
    type: "catboost"
    params:
      iterations: 4000
      learning_rate: 0.03
      depth: 6
      loss_function: "Logloss"
      eval_metric: "AUC"
      random_seed: 42
      verbose: 200
      allow_writing_files: false

  - name: "tabpfn"
    type: "tabpfn"
    params:
      device: "auto"

  - name: "realmlp"
    type: "torch_custom"
    params: {}

  - name: "tabnet"
    type: "tabnet"
    params: {}

  - name: "ft_transformer"
    type: "torch_tabular"
    params: {}

  - name: "tabtransformer"
    type: "torch_tabular"
    params: {}

  - name: "saint"
    type: "torch_custom"
    params: {}

  - name: "dcnv2"
    type: "torch_custom"
    params: {}

  - name: "node"
    type: "torch_custom"
    params: {}

  - name: "carte"
    type: "torch_custom"
    params:
      note: "CARTE is research-heavy; implement only if you have a clean reference implementation."
